name: Build & Release Grassy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            python3-venv \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            make

      - name: Get version from Makefile
        id: version
        run: |
          VERSION=$(make version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Run full build (binary + AppImage)
        run: |
          make release-linux

      - name: Locate AppImage
        id: artifact
        run: |
          APPIMAGE=$(ls release/*.AppImage 2>/dev/null | head -n 1)
          echo "APPIMAGE=$APPIMAGE" >> $GITHUB_OUTPUT
          echo "Found: $APPIMAGE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: grassy-linux
          path: ${{ steps.artifact.outputs.APPIMAGE }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from Makefile
        id: version
        run: |
          VERSION=$(make version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: grassy-linux
          path: release/

      - name: Find AppImage
        id: file
        run: |
          FILE=$(ls release/*.AppImage | head -n 1)
          echo "FILE=$FILE" >> $GITHUB_OUTPUT
          echo "Using: $FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Grassy v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            ${{ steps.file.outputs.FILE }}
