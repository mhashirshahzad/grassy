
name: Build AppImage on Tag Push

on:
  push:
    tags:
      - 'v*'  

permissions:
  contents: write  

jobs:
  appimage-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # Or your specific version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-1 \
            libadwaita-1-0 \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgirepository1.0-dev \
            gcc \
            libcairo2-dev \
            pkg-config \
            python3-dev
          
          wget -c "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Install Python dependencies and build AppImage
        run: |
          make setup  # Create virtual environment and install requirements
          make release  # This will run both 'binary' and 'appimage' targets

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          # This uploads all files matching the pattern (e.g., grassy-1.2.3-x86_64.AppImage)
          files: release/grassy-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
